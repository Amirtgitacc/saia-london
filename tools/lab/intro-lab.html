<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAÏA — Intro Lab · concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F5F1E8;
    --ink:#2B2620;
    --terra:#B8624A;
    --muted:#4A4339;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#1c1916; color:var(--cream);
    font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100vh;
  }

  /* ---------- lab chrome ---------- */
  .lab-bar{
    position:sticky; top:0; z-index:50;
    display:flex; flex-wrap:wrap; align-items:center; gap:9px;
    padding:13px 18px; background:rgba(20,18,16,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid rgba(245,241,232,.12);
  }
  .lab-bar h1{ font-family:'Playfair Display',serif; font-weight:600; font-size:17px; letter-spacing:.02em; margin-right:6px; }
  .lab-bar h1 span{ color:var(--terra); }
  .lab-bar .spacer{ flex:1; }
  .btn{
    appearance:none; border:1px solid rgba(245,241,232,.22); background:transparent; color:var(--cream);
    font:inherit; font-size:12.5px; letter-spacing:.03em; padding:8px 13px; border-radius:999px; cursor:pointer;
    transition:background .2s ease, border-color .2s ease, color .2s ease;
  }
  .btn:hover{ background:rgba(245,241,232,.1); }
  .btn:focus-visible{ outline:2px solid var(--terra); outline-offset:2px; }
  .btn.active{ background:var(--terra); border-color:var(--terra); color:#fff; }
  .btn.ghost{ opacity:.7; }

  /* ---------- stage ---------- */
  .stage-wrap{ flex:1; display:flex; flex-direction:column; padding:22px; gap:14px; }
  .stage{ position:relative; flex:1; min-height:60vh; border-radius:14px; overflow:hidden; background:var(--cream); box-shadow:0 30px 80px rgba(0,0,0,.5); }
  .stage-meta{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; color:rgba(245,241,232,.65); font-size:12.5px; letter-spacing:.04em; }
  .stage-meta strong{ color:var(--cream); font-weight:500; }
  .stage-meta .dot{ width:4px; height:4px; border-radius:50%; background:var(--terra); }

  .scene{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--cream); color:var(--ink); opacity:0; pointer-events:none; }
  .scene.show{ opacity:1; pointer-events:auto; }

  /* shared bits */
  .wordmark{ font-family:'Playfair Display',serif; font-weight:600; font-size:clamp(54px,11vw,140px); line-height:.9; letter-spacing:.02em; color:var(--ink); }
  .tagline{ font-family:'Inter',sans-serif; font-weight:300; font-size:clamp(11px,1.5vw,15px); letter-spacing:.34em; text-transform:uppercase; color:var(--muted); }
  .logo-img{ width:clamp(180px,34vw,440px); height:auto; display:block; }

  /* ====== 1 EDITORIAL WORDMARK ====== */
  #c1 .c1-wrap{ text-align:center; }
  #c1 .c1-word{ display:inline-flex; overflow:hidden; }
  #c1 .c1-word b{ display:inline-block; font-weight:600; transform:translateY(110%); opacity:0; animation:c1rise .9s cubic-bezier(.2,.7,.2,1) forwards; }
  #c1 .c1-word b:nth-child(1){ animation-delay:.15s; }
  #c1 .c1-word b:nth-child(2){ animation-delay:.30s; }
  #c1 .c1-word b:nth-child(3){ animation-delay:.45s; }
  #c1 .c1-word b:nth-child(4){ animation-delay:.60s; }
  @keyframes c1rise{ to{ transform:translateY(0); opacity:1; } }
  #c1 .c1-rule{ height:1.5px; width:0; margin:26px auto 0; background:var(--terra); animation:c1rule .8s ease .95s forwards; }
  @keyframes c1rule{ to{ width:min(260px,60%); } }
  #c1 .c1-tag{ margin-top:22px; opacity:0; transform:translateY(8px); animation:c1tag .8s ease 1.35s forwards; }
  @keyframes c1tag{ to{ opacity:1; transform:translateY(0); } }

  /* ====== 2 UNROLLING MAT ====== */
  #c2 .c2-stageinner{ position:relative; width:min(620px,82%); text-align:center; }
  #c2 .c2-mat{ position:relative; height:clamp(120px,22vh,210px); border-radius:14px;
    background:repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 2px, transparent 2px 22px), linear-gradient(180deg,#c06a51,#a8553e);
    box-shadow:0 24px 50px rgba(168,85,62,.35); transform-origin:left center; clip-path:inset(0 100% 0 0);
    animation:c2roll 1.1s cubic-bezier(.4,.8,.2,1) .2s forwards; }
  @keyframes c2roll{ to{ clip-path:inset(0 0 0 0); } }
  #c2 .c2-nub{ position:absolute; top:50%; left:0; width:26px; height:calc(100% + 26px); transform:translateY(-50%);
    border-radius:8px; background:#8f4631; box-shadow:0 8px 22px rgba(0,0,0,.3);
    animation:c2nub 1.1s cubic-bezier(.4,.8,.2,1) .2s forwards; }
  @keyframes c2nub{ 0%{ left:0; opacity:1; } 85%{ opacity:1; } 100%{ left:100%; opacity:0; } }
  #c2 .c2-word{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff;
    font-family:'Playfair Display',serif; font-weight:600; font-size:clamp(40px,8vw,92px); letter-spacing:.04em;
    opacity:0; transform:scale(.96); animation:c2word .7s ease 1.15s forwards; }
  @keyframes c2word{ to{ opacity:1; transform:scale(1); } }
  #c2 .c2-tag{ margin-top:26px; opacity:0; animation:c2tag .8s ease 1.5s forwards; }
  @keyframes c2tag{ to{ opacity:1; } }

  /* ====== 3 BREATH / PULSE ====== */
  #c3{ background:radial-gradient(120% 120% at 50% 40%, #faf7f0, #efe9dc); }
  #c3 .c3-wrap{ position:relative; display:grid; place-items:center; width:100%; height:100%; }
  #c3 .c3-ring{ position:absolute; width:min(46vh,360px); aspect-ratio:1; border-radius:50%; border:1.5px solid rgba(184,98,74,.55);
    transform:scale(.55); opacity:0; animation:c3breath 4.2s cubic-bezier(.45,0,.55,1) .1s forwards; }
  #c3 .c3-ring.r2{ animation-delay:.25s; border-color:rgba(184,98,74,.3); }
  #c3 .c3-ring.r3{ animation-delay:.45s; border-color:rgba(184,98,74,.15); }
  @keyframes c3breath{ 0%{ transform:scale(.5); opacity:0; } 35%{ transform:scale(1); opacity:1; } 70%{ transform:scale(.72); opacity:.9; } 100%{ transform:scale(.9); opacity:0; } }
  #c3 .c3-cue{ position:absolute; bottom:14%; left:50%; transform:translateX(-50%); font-size:12px; letter-spacing:.4em; text-transform:uppercase; color:var(--terra); opacity:0; animation:c3cue 4.2s ease .1s forwards; }
  @keyframes c3cue{ 0%,8%{ opacity:0; } 18%{ opacity:1; } 80%{ opacity:1; } 100%{ opacity:0; } }
  #c3 .c3-center{ position:relative; text-align:center; opacity:0; transform:translateY(6px); animation:c3word 1.1s ease 1.9s forwards; }
  @keyframes c3word{ to{ opacity:1; transform:translateY(0); } }

  /* ====== 4 SPLIT REVEAL ====== */
  #c4{ background:var(--ink); }
  #c4 .c4-word{ text-align:center; color:var(--cream); opacity:0; transform:scale(1.06); animation:c4word .9s cubic-bezier(.2,.7,.2,1) .7s forwards; }
  #c4 .c4-word .wordmark{ color:var(--cream); }
  #c4 .c4-word .tagline{ color:rgba(245,241,232,.6); }
  @keyframes c4word{ to{ opacity:1; transform:scale(1); } }
  #c4 .c4-panel{ position:absolute; top:0; height:100%; width:50%; background:var(--terra); z-index:3; }
  #c4 .c4-panel.left{ left:0; --from:-100%; animation:c4in .55s ease forwards, c4outL .7s cubic-bezier(.7,0,.3,1) .85s forwards; }
  #c4 .c4-panel.right{ right:0; --from:100%; animation:c4in .55s ease forwards, c4outR .7s cubic-bezier(.7,0,.3,1) .85s forwards; }
  @keyframes c4in{ from{ transform:translateX(var(--from)); } to{ transform:translateX(0); } }
  @keyframes c4outL{ to{ transform:translateX(-101%); } }
  @keyframes c4outR{ to{ transform:translateX(101%); } }
  #c4 .c4-seam{ position:absolute; top:0; left:50%; width:1px; height:100%; background:rgba(255,255,255,.5); z-index:4; transform:translateX(-50%); opacity:0; animation:c4seam .85s ease forwards; }
  @keyframes c4seam{ 0%{ opacity:0; } 30%{ opacity:1; } 100%{ opacity:0; } }

  /* ====== 5 LOGO — QUIET REVEAL (official logo) ====== */
  #c5{ background:var(--cream); }
  #c5 .c5-wrap{ position:relative; display:grid; place-items:center; text-align:center; }
  #c5 .c5-glow{ position:absolute; width:min(70vh,640px); aspect-ratio:1; border-radius:50%;
    background:radial-gradient(circle, rgba(184,98,74,.18), rgba(184,98,74,0) 62%);
    transform:scale(.6); opacity:0; animation:c5glow 2.4s ease .1s forwards; }
  @keyframes c5glow{ 0%{ transform:scale(.6); opacity:0; } 45%{ opacity:1; } 100%{ transform:scale(1.05); opacity:.85; } }
  #c5 .logo-img{ opacity:0; transform:scale(.88); filter:blur(6px); animation:c5logo 1.3s cubic-bezier(.2,.7,.2,1) .35s forwards; }
  @keyframes c5logo{ to{ opacity:1; transform:scale(1); filter:blur(0); } }
  #c5 .c5-tag{ margin-top:30px; opacity:0; transform:translateY(8px); animation:c5tag .9s ease 1.25s forwards; }
  @keyframes c5tag{ to{ opacity:1; transform:translateY(0); } }

  /* ====== 6 LOGO — RULES & WIPE (official logo) ====== */
  #c6{ background:#faf7f0; }
  #c6 .c6-wrap{ position:relative; display:grid; place-items:center; text-align:center; }
  #c6 .c6-rule{ position:absolute; left:50%; width:0; height:1.5px; background:var(--terra); transform:translateX(-50%); }
  #c6 .c6-rule.top{ top:calc(50% - clamp(90px,15vh,150px)); animation:c6rule 1s cubic-bezier(.3,.7,.2,1) .15s forwards; }
  #c6 .c6-rule.bot{ top:calc(50% + clamp(90px,15vh,150px)); animation:c6rule 1s cubic-bezier(.3,.7,.2,1) .3s forwards; }
  @keyframes c6rule{ to{ width:min(340px,72%); } }
  #c6 .logo-img{ -webkit-clip-path:inset(0 0 100% 0); clip-path:inset(0 0 100% 0); transform:translateY(10px);
    animation:c6wipe 1s cubic-bezier(.4,.8,.2,1) .55s forwards; }
  @keyframes c6wipe{ to{ -webkit-clip-path:inset(0 0 0 0); clip-path:inset(0 0 0 0); transform:translateY(0); } }
  #c6 .c6-tag{ margin-top:26px; opacity:0; animation:c6tag .9s ease 1.45s forwards; }
  @keyframes c6tag{ to{ opacity:1; } }

  /* ====== 7 LINE-DRAWN LETTERS ====== */
  #c7{ background:var(--cream); }
  #c7 .c7-wrap{ position:relative; width:min(760px,88%); display:grid; place-items:center; }
  #c7 .c7-lines{ position:absolute; inset:0; overflow:hidden; }
  #c7 .c7-lines i{ position:absolute; left:-120%; width:120%; height:1px; }
  /* multi-colour sweeping lines: terracotta · ink · soft gold · terracotta */
  #c7 .c7-lines i:nth-child(1){ top:28%; background:linear-gradient(90deg, transparent, rgba(184,98,74,.8), transparent); animation:c7sweep 1.1s ease .0s forwards; }
  #c7 .c7-lines i:nth-child(2){ top:46%; background:linear-gradient(90deg, transparent, rgba(43,38,32,.8), transparent); animation:c7sweep 1.1s ease .18s forwards; }
  #c7 .c7-lines i:nth-child(3){ top:62%; background:linear-gradient(90deg, transparent, rgba(194,160,78,.85), transparent); animation:c7sweep 1.1s ease .34s forwards; }
  #c7 .c7-lines i:nth-child(4){ top:78%; background:linear-gradient(90deg, transparent, rgba(184,98,74,.8), transparent); animation:c7sweep 1.1s ease .5s forwards; }
  @keyframes c7sweep{ 0%{ left:-120%; opacity:0; } 25%{ opacity:1; } 80%{ opacity:1; } 100%{ left:120%; opacity:0; } }
  #c7 svg{ width:100%; height:auto; overflow:visible; }
  #c7 .c7-text{ font-family:'Playfair Display',serif; font-weight:600; font-size:170px; letter-spacing:2px;
    fill:transparent; stroke:var(--terra); stroke-width:1.2;
    stroke-dasharray:2400; stroke-dashoffset:2400;
    animation:c7draw 2.2s ease .9s forwards, c7fill .35s ease 2.7s forwards; }
  @keyframes c7draw{ to{ stroke-dashoffset:0; } }
  @keyframes c7fill{ to{ fill:var(--ink); stroke:rgba(184,98,74,0); } }
  #c7 .c7-tag{ margin-top:8px; opacity:0; animation:c7tag .8s ease 3.15s forwards; }
  @keyframes c7tag{ to{ opacity:1; } }

  /* reduced motion: show end-states */
  @media (prefers-reduced-motion: reduce){
    .scene *{ animation:none !important; opacity:1 !important; transform:none !important; clip-path:none !important; -webkit-clip-path:none !important; filter:none !important; }
    #c1 .c1-rule{ width:min(260px,60%); }
    #c2 .c2-nub{ display:none; }
    #c6 .c6-rule{ width:min(340px,72%); }
    #c7 .c7-text{ fill:var(--ink); stroke:transparent; }
  }
</style>
</head>
<body>

  <div class="lab-bar">
    <h1>SAÏA <span>Intro Lab</span></h1>
    <button class="btn active" data-go="1">1 · Editorial</button>
    <button class="btn" data-go="2">2 · Unrolling mat</button>
    <button class="btn" data-go="3">3 · Breath</button>
    <button class="btn" data-go="4">4 · Split reveal</button>
    <button class="btn" data-go="5">5 · Logo · glow</button>
    <button class="btn" data-go="6">6 · Logo · wipe</button>
    <button class="btn" data-go="7">7 · Line-drawn</button>
    <span class="spacer"></span>
    <button class="btn ghost" id="replay">↻ Replay</button>
    <button class="btn ghost" id="playall">▶ Play all</button>
  </div>

  <div class="stage-wrap">
    <div class="stage-meta">
      <strong id="metaName"></strong><span class="dot"></span><span id="metaDesc"></span>
    </div>

    <div class="stage" id="stage">

      <div class="scene show" id="c1">
        <div class="c1-wrap">
          <div class="wordmark c1-word"><b>S</b><b>A</b><b>Ï</b><b>A</b></div>
          <div class="c1-rule"></div>
          <div class="tagline c1-tag">Yoga mat hire across London</div>
        </div>
      </div>

      <div class="scene" id="c2">
        <div class="c2-stageinner">
          <div class="c2-mat"><div class="c2-word">SAÏA</div></div>
          <div class="c2-nub"></div>
          <div class="tagline c2-tag">Yoga mat hire across London</div>
        </div>
      </div>

      <div class="scene" id="c3">
        <div class="c3-wrap">
          <div class="c3-ring"></div><div class="c3-ring r2"></div><div class="c3-ring r3"></div>
          <div class="c3-center">
            <div class="wordmark">SAÏA</div>
            <div class="tagline" style="margin-top:18px;">Breathe. Move. Belong.</div>
          </div>
          <div class="c3-cue">Inhale&nbsp;&nbsp;·&nbsp;&nbsp;Exhale</div>
        </div>
      </div>

      <div class="scene" id="c4">
        <div class="c4-word">
          <div class="wordmark">SAÏA</div>
          <div class="tagline" style="margin-top:18px;">London · Female-led · On the mat</div>
        </div>
        <div class="c4-panel left"></div><div class="c4-panel right"></div><div class="c4-seam"></div>
      </div>

      <div class="scene" id="c5">
        <div class="c5-wrap">
          <div class="c5-glow"></div>
          <img class="logo-img" src="../../assets/saia-logo.avif" alt="SAÏA London">
          <div class="tagline c5-tag">Yoga mat hire across London</div>
        </div>
      </div>

      <div class="scene" id="c6">
        <div class="c6-wrap">
          <div class="c6-rule top"></div>
          <img class="logo-img" src="../../assets/saia-logo.avif" alt="SAÏA London">
          <div class="c6-rule bot"></div>
          <div class="tagline c6-tag">London · Female-led · On the mat</div>
        </div>
      </div>

      <div class="scene" id="c7">
        <div class="c7-wrap">
          <div class="c7-lines"><i></i><i></i><i></i><i></i></div>
          <svg viewBox="0 0 600 220" role="img" aria-label="SAÏA">
            <text class="c7-text" x="300" y="160" text-anchor="middle">SAÏA</text>
          </svg>
          <div class="tagline c7-tag">Yoga mat hire across London</div>
        </div>
      </div>

    </div>
  </div>

<script>
(function(){
  var META = {
    1:['Concept 1 — Editorial wordmark','Letters rise in, terracotta rule draws under, tagline settles.'],
    2:['Concept 2 — Unrolling mat','A terracotta mat unrolls; the wordmark settles onto it.'],
    3:['Concept 3 — Breath / pulse','Soft rings breathe in and out; wordmark fades in centered.'],
    4:['Concept 4 — Split reveal','A terracotta wipe sweeps in, then splits to reveal the wordmark.'],
    5:['Concept 5 — Logo · quiet glow','Official logo fades & sharpens in over a soft terracotta glow.'],
    6:['Concept 6 — Logo · rules & wipe','Two terracotta rules draw out; the official logo wipes in between them.'],
    7:['Concept 7 — Line-drawn letters','Lines sweep across, then the letters draw themselves and ink in.']
  };
  var ids = [1,2,3,4,5,6,7];
  var scenes = {}, templates = {};
  ids.forEach(function(n){ var el = document.getElementById('c'+n); scenes[n] = el; templates[n] = el.innerHTML; });
  var btns = Array.prototype.slice.call(document.querySelectorAll('[data-go]'));
  function $(id){ return document.getElementById(id); }
  var current = 1;

  function show(n){
    ids.forEach(function(k){
      var s = scenes[k], on = (k === n);
      s.classList.toggle('show', on);
      // re-inject the active scene's markup → fresh DOM nodes restart every CSS animation
      if (on){ s.innerHTML = templates[k]; }
    });
    btns.forEach(function(b){ b.classList.toggle('active', +b.dataset.go === n); });
    $('metaName').textContent = META[n][0];
    $('metaDesc').textContent = META[n][1];
    current = n;
  }

  btns.forEach(function(b){ b.addEventListener('click', function(){ stopAll(); show(+b.dataset.go); }); });
  $('replay').addEventListener('click', function(){ stopAll(); show(current); });

  var allTimer = null;
  function stopAll(){ if (allTimer){ clearTimeout(allTimer); allTimer = null; } $('playall').textContent = '▶ Play all'; }
  $('playall').addEventListener('click', function(){
    if (allTimer){ stopAll(); return; }
    $('playall').textContent = '⏹ Stop';
    var i = 0;
    (function step(){
      show(ids[i]); i++;
      allTimer = setTimeout(i < ids.length ? step : stopAll, 4200);
    })();
  });

  document.addEventListener('keydown', function(e){
    if (e.key >= '1' && e.key <= '7'){ stopAll(); show(+e.key); }
    else if (e.key.toLowerCase() === 'r'){ stopAll(); show(current); }
  });

  show(1);
})();
</script>
</body>
</html>
